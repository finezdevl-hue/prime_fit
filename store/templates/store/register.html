{% extends 'store/base.html' %}
{% block title %}Register – PRIME FIT Apparels{% endblock %}
{% block extra_css %}
<style>
.auth-page{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:60px 5%;background:var(--black)}
.auth-page::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(45deg,rgba(201,162,39,0.03) 0,rgba(201,162,39,0.03) 1px,transparent 1px,transparent 40px);pointer-events:none}
.auth-card{background:var(--white);border-radius:24px;padding:48px;max-width:520px;width:100%;position:relative;z-index:1}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .brand{font-family:var(--font-display);font-size:32px;color:var(--black);letter-spacing:4px}
.auth-logo .brand span{color:var(--gold)}
.auth-logo p{font-size:12px;color:var(--gray);letter-spacing:2px;margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--gray)}
.auth-footer a{color:var(--gold);font-weight:600}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand">PRIME <span>FIT</span></div>
      <p>Create Your Account</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" class="form-control" placeholder="First name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" class="form-control" placeholder="Last name">
        </div>
      </div>
      <div class="form-group">
        <label>Username *</label>
        <input type="text" name="username" class="form-control" required placeholder="Choose a username" autofocus>
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="email" class="form-control" required placeholder="your@email.com">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password *</label>
          <input type="password" name="password1" class="form-control" required placeholder="Min 8 characters">
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" name="password2" class="form-control" required placeholder="Repeat password">
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-lg" style="width:100%;justify-content:center;margin-top:8px">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Login here</a>
    </div>
  </div>
</div>
{% endblock %}
