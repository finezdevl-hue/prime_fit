services:
  - type: web
    name: primefit-django
    env: python
    buildCommand: bash build.sh
    startCommand: gunicorn primefit.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: primefit-django.onrender.com,www.primefit-django.onrender.com
      - key: SECRET_KEY
        fromFile: /etc/secrets/.env
      - key: DATABASE_URL
        fromDatabase:
          name: primefit-db
          property: connectionString

databases:
  - name: primefit-db
    plan: free
    primaryRegion: oregon
    ipAllowList: []
